{% set name = "hicberg" %}
{% set version = "1.0.2" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: d5558cd419c8d46bdc958064cb97f963d1ea793866414c025906ec15033512ed

build:
  number: 0
  noarch: python
  entry_points:
    - hicberg=hicberg.__main__:cli
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"
  run_exports:
    - {{ pin_subpackage('hicberg', max_pin="x") }}

requirements:
  host:
    - python >=3.10,<3.11
    - pip          # pour installer
    - setuptools   # pour builder

  run:
    - python >=3.10,<3.11
    - bioframe     # importé dans le code
    - biopython    # importé dans le code
    - bowtie2      # outil utilisé
    - click        # importé dans le code
    - cooler       # importé dans le code
    - hicstuff     # importé dans le code
    - matplotlib-base
    - numpy
    - pandas
    - pysam
    - samtools     # outil utilisé
    - scipy

test:
  imports:
    - hicberg
  commands:
    - hicberg --help

about:
  home: "https://github.com/koszullab/hicberg"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Statistical profiling based tool for contact data (Hi-C, ChIA-PET, Capture-C, etc.) and genomics data reconstruction"
  dev_url: "https://github.com/koszullab/hicberg"

extra:
  maintainers:
    - axelcournac
