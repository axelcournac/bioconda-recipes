{% set name = "hicberg" %}
{% set version = "1.0.2" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: d5558cd419c8d46bdc958064cb97f963d1ea793866414c025906ec15033512ed

build:
  number: 0
  noarch: python
  entry_points:
    - hicberg=hicberg.__main__:cli
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"

requirements:
  host:
    - python
    - pip
    - bioframe
    - biopython
    - click
    - cooler
    - hicstuff
    - matplotlib
    - numpy
    - pandas
    - pysam
    - scipy
  run:
    - python
    - bioframe
    - biopython
    - bowtie2
    - click
    - cooler
    - hicstuff
    - matplotlib
    - numpy
    - pandas
    - pysam
    - samtools
    - scipy

test:
  imports:
    - hicberg
  commands:
    - hicberg --help

about:
  home: "https://github.com/koszullab/hicberg"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Statistical profiling based tool for contact data (Hi-C, ChIA-PET, Capture-C, etc.) and genomics data reconstruction"
  dev_url: "https://github.com/koszullab/hicberg"

extra:
  maintainers:
    - axelcournac
